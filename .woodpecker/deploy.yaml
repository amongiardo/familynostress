when:
  - event: push
    branch: main

steps:
  - name: deploy
    image: alpine:3.20
    environment:
      DEPLOY_KEY:
        from_secret: deploy_key
    commands:
      - apk add --no-cache openssh-client
      - install -d -m 700 /root/.ssh
      - printf '%s\n' "$${DEPLOY_KEY}" > /root/.ssh/id_ed25519
      - chmod 600 /root/.ssh/id_ed25519
      - ssh-keyscan -H 212.227.244.80 >> /root/.ssh/known_hosts
      - ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes root@212.227.244.80 /root/deployments/familynostress/deploy.sh
